<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Alerta - Central</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #1a252f; color: white; overflow: hidden; }
    .pantalla-registro { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 30px; text-align: center; }
    .card { background: #2c3e50; padding: 35px; border-radius: 15px; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    h2 { margin-bottom: 15px; font-size: 24px; }
    p { font-size: 16px; color: #bdc3c7; line-height: 1.4; margin-bottom: 25px; }
    button { width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .btn-conectar { background: #3498db; color: white; }
    .pantalla-emergencia { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e74c3c; color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 9999; animation: parpadeo-fondo 0.8s infinite; }
    .pantalla-emergencia h1 { font-size: 45px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
    .pantalla-emergencia h2 { font-size: 30px; font-weight: 600; line-height: 1.3; }
    @keyframes parpadeo-fondo { 0% { background: #e74c3c; } 50% { background: #c0392b; } 100% { background: #e74c3c; } }
  </style>
</head>
<body>

  <div id="vista-usuario" class="pantalla-registro">
    <div class="card">
      <h2>Seguridad Industrial</h2>
      <p>Al ingresar a la central, presione el botón para enlazar el teléfono al sistema de alertas por proximidad GPS.</p>
      <button class="btn-conectar" onclick="conectarTelefono()">CONECTAR Y VALIDAR POSICIÓN</button>
    </div>
  </div>

  <div id="alarma-pantalla-completa" class="pantalla-emergencia">
    <h1>EMERGENCIA DE PLANTA</h1>
    <h2>EVACUAR INMEDIATAMENTE AL PUNTO DE ENCUENTRO</h2>
  </div>

  <audio id="sonidoSirena" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" loop></audio>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB7z5w4fgNw1QTV-Cx37j-m8r8I94J1Vuk",
      authDomain: "alertacentral-9ba4f.firebaseapp.com",
      databaseURL: "https://alertacentral-9ba4f-default-rtdb.firebaseio.com",
      projectId: "alertacentral-9ba4f",
      storageBucket: "alertacentral-9ba4f.firebasestorage.app",
      messagingSenderId: "770130153303",
      appId: "1:770130153303:web:ade358f215f5a7c46f3812"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let messaging;
    let swRegistration = null;

    // Registrar Service Worker de fondo de manera explícita
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then((reg) => {
            swRegistration = reg;
            console.log('Service Worker registrado con éxito');
            try {
              messaging = firebase.messaging();
              messaging.useServiceWorker(reg); // Vincula Firebase con el archivo de fondo
            } catch(e) {
              console.log("Error al vincular el sistema de mensajería masiva");
            }
          }).catch((err) => {
            console.error('Error al registrar el Service Worker:', err);
          });
      });
    }

    let intervaloVibracion;
    const audio = document.getElementById('sonidoSirena');
    
    const LAT_CENTRAL = -34.903069; 
    const LON_CENTRAL = -58.733804;
    const DISTANCIA_MAXIMA_METROS = 500;

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const phi1 = lat1 * Math.PI/180;
      const phi2 = lat2 * Math.PI/180;
      const deltaPhi = (lat2-lat1) * Math.PI/180;
      const deltaLambda = (lon2-lon1) * Math.PI/180;
      const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                Math.cos(phi1) * Math.cos(phi2) *
                Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c; 
    }

    function conectarTelefono() {
      audio.play().then(() => audio.pause()).catch(e => console.log("Audio listo"));

      if (!navigator.geolocation) {
        alert("Tu teléfono no soporta localización GPS.");
        return;
      }

      navigator.geolocation.getCurrentPosition((position) => {
        const miLat = position.coords.latitude;
        const miLon = position.coords.longitude;
        
        const distancia = calcularDistancia(miLat, miLon, LAT_CENTRAL, LON_CENTRAL);
        
        if (distancia > DISTANCIA_MAXIMA_METROS) {
          alert("Estás fuera del perímetro de seguridad (" + Math.round(distancia) + " metros de distancia). No recibirás alertas.");
          return;
        }

        // Solicitar permisos Push reales para romper bloqueo
        if (messaging && swRegistration) {
          Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
              // Clave VAPID limpia y sin espacios internos
              messaging.getToken({ 
                vapidKey: 'BP_4wDpG5YzvLNy5ENf3_UtGPP1ms4f2YEbimIGkkThZL8b75HbuRyzkepCy8m4EOWohcqMV1RaU06_xpPrdFW8',
                serviceWorkerRegistration: swRegistration
              }).then((tokenActual) => {
                if (tokenActual) {
                  database.ref('dispositivosActivos/' + tokenActual).set({
                    fecha: Date.now(),
                    activo: true
                  });
                }
              }).catch((err) => {
                console.error("Error obteniendo el token push:", err);
              });
            }
          });
        }

        escucharBaseDeDatos();
        alert("¡Verificación exitosa! Te encuentras dentro de los 500m de la Central. Enlazado al sistema.");

      }, (error) => {
        alert("Error de GPS: Por favor activa la ubicación de alta precisión en tu celular.");
      }, { enableHighAccuracy: true });
    }

    function escucharBaseDeDatos() {
      database.ref('estadoAlarma').on('value', (snapshot) => {
        const estado = snapshot.val();
        if (estado === 'ON') {
          navigator.geolocation.getCurrentPosition((pos) => {
            const d = calcularDistancia(pos.coords.latitude, pos.coords.longitude, LAT_CENTRAL, LON_CENTRAL);
            if (d <= DISTANCIA_MAXIMA_METROS) {
              document.getElementById('alarma-pantalla-completa').style.display = 'flex';
              document.getElementById('vista-usuario').style.display = 'none';
              audio.volume = 1.0; 
              audio.play().catch(e => console.log("Interacción requerida"));
              if ('vibrate' in navigator && !intervaloVibracion) {
                intervaloVibracion = setInterval(() => { navigator.vibrate([600, 300, 600]); }, 1000);
              }
            }
          });
        } else {
          document.getElementById('alarma-pantalla-completa').style.display = 'none';
          document.getElementById('vista-usuario').style.display = 'flex';
          audio.pause();
          if (intervaloVibracion) { clearInterval(intervaloVibracion); intervaloVibracion = null; navigator.vibrate(0); }
        }
      });
    }
  </script>
</body>
</html>
